<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D P2P LAN Shooter - First Person</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        #chat-box { height: 120px; overflow-y: auto; background: rgba(0,0,0,0.5); color: white; padding: 5px; font-size: 12px; }
        .hp-bar-bg { width: 100%; height: 10px; background: #444; border-radius: 5px; overflow: hidden; }
        #hp-bar-fill { height: 100%; width: 100%; background: #ff4444; transition: width 0.2s; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui-layer" class="flex flex-col justify-between p-4">
        <!-- Connection UI -->
        <div class="bg-black/60 p-4 rounded-lg text-white w-80 interactive">
            <h2 class="font-bold border-b border-white/20 mb-2">Multiplayer Lobby</h2>
            <div class="mb-2">
                <label class="text-[10px] text-gray-400 block">Username:</label>
                <input id="username" type="text" placeholder="Guest" class="bg-gray-800 border border-gray-600 px-2 py-1 text-xs w-full rounded mb-2">
            </div>
            <div class="mb-2 text-sm">Your ID: <span id="my-id" class="font-mono text-yellow-400 text-xs">Connecting...</span></div>
            <div class="flex gap-2">
                <input id="dest-id" type="text" placeholder="Paste Peer ID" class="bg-gray-800 border border-gray-600 px-2 py-1 text-xs flex-1 rounded">
                <button onclick="connectToPeer()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 text-xs rounded">Connect</button>
            </div>
            <div id="status" class="text-[10px] mt-1 text-gray-400">Waiting for connection...</div>
        </div>

        <!-- Weapon & Health UI -->
        <div class="absolute top-4 right-4 text-white text-right">
            <div id="weapon-display" class="bg-black/40 p-3 rounded-lg mb-2">
                <div class="text-xs text-gray-400">WEAPON</div>
                <div class="font-bold text-yellow-400 text-lg">Shotgun</div>
                <div class="text-[10px] text-gray-300 mt-1">1: Shotgun | 2: Minigun | 3: Laser</div>
            </div>
            <div class="bg-black/40 p-3 rounded-lg w-48 ml-auto">
                <div class="flex justify-between text-[10px] mb-1 font-bold">
                    <span>HEALTH</span>
                    <span id="hp-text">100 / 100</span>
                </div>
                <div class="hp-bar-bg">
                    <div id="hp-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- Chat and Controls -->
        <div class="flex justify-between items-end">
            <div class="w-64 interactive">
                <div id="chat-box" class="rounded-t-lg"></div>
                <input id="chat-input" type="text" placeholder="Press Enter to chat..." class="w-full bg-black/80 text-white border-none p-2 text-sm rounded-b-lg">
            </div>
            <div class="text-white text-right text-[10px] bg-black/40 p-2 rounded">
                WASD: Move | SPACE: Jump | ARROWS: Look | 1-3: Swap Gun | Shift/F: Shoot
            </div>
        </div>
    </div>

    <script>
        // --- GAME CONFIG & STATE ---
        const players = {};
        const bullets = [];
        let myId = null;
        let conn = null;
        let myUsername = "Guest";
        
        const GUNS = {
            1: { name: "Shotgun", rate: 600, color: 0xffff00, spread: 0.25, count: 6, speed: 0.8, damage: 8 },
            2: { name: "Minigun", rate: 100, color: 0x00ffff, spread: 0.08, count: 1, speed: 1.1, damage: 5 },
            3: { name: "Laser", rate: 250, color: 0xff00ff, spread: 0, count: 1, speed: 2.0, damage: 20 }
        };
        let currentGunKey = 1;
        let lastFireTime = 0;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        scene.fog = new THREE.Fog(0x0a0a12, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xeeeeff, 0x444422, 1);
        scene.add(light);

        const grid = new THREE.GridHelper(200, 100, 0x333333, 0x111111);
        scene.add(grid);

        // --- PLAYER LOGIC ---
        function createPlayerMesh(color = 0x00ff00) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshPhongMaterial({ color }));
            body.position.y = 1;
            group.add(body);
            
            // Direction indicator
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            head.position.set(0, 1.5, -0.4);
            group.add(head);

            // Health Bar over head
            const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({ color: 0x333333 }));
            hpBg.position.set(0, 2.5, 0);
            group.add(hpBg);
            
            const hpFill = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            hpFill.position.set(0, 2.5, 0.01);
            group.add(hpFill);
            group.hpFill = hpFill;
            
            return group;
        }

        const localPlayer = {
            mesh: createPlayerMesh(0x3366ff),
            velocity: new THREE.Vector3(0, 0, 0),
            rotationY: 0,
            rotationX: 0,
            isGrounded: true,
            health: 100,
            maxHealth: 100
        };
        // Hide local player mesh from first person view
        localPlayer.mesh.visible = false;
        scene.add(localPlayer.mesh);

        // --- INPUT HANDLING ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.key === '1' || e.key === '2' || e.key === '3') {
                currentGunKey = parseInt(e.key);
                document.getElementById('weapon-display').querySelector('.font-bold').innerText = GUNS[currentGunKey].name;
            }
            if (e.code === 'Enter') {
                const input = document.getElementById('chat-input');
                if (document.activeElement === input) {
                    if (input.value) {
                        sendData({ type: 'chat', text: input.value, name: myUsername });
                        addChatMessage(myUsername, input.value);
                        input.value = '';
                    }
                    input.blur();
                } else {
                    myUsername = document.getElementById('username').value || "Guest";
                    input.focus();
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- NETWORKING ---
        const peer = new Peer();
        peer.on('open', id => {
            myId = id;
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', c => {
            conn = c;
            setupConnection();
        });

        function connectToPeer() {
            const destId = document.getElementById('dest-id').value;
            if (!destId) return;
            conn = peer.connect(destId);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected!";
                document.getElementById('status').className = "text-[10px] mt-1 text-green-400";
                players.remote = { 
                    mesh: createPlayerMesh(0xff3333),
                    health: 100 
                };
                scene.add(players.remote.mesh);
            });

            conn.on('data', data => {
                if (data.type === 'move') {
                    if (players.remote) {
                        players.remote.mesh.position.set(data.pos.x, data.pos.y, data.pos.z);
                        players.remote.mesh.rotation.y = data.rot;
                    }
                } else if (data.type === 'shoot') {
                    spawnBullet(data.pos, data.dir, true, data.color);
                } else if (data.type === 'chat') {
                    addChatMessage(data.name || "Peer", data.text);
                } else if (data.type === 'hit') {
                    takeDamage(data.damage);
                } else if (data.type === 'healthUpdate') {
                    if (players.remote) {
                        players.remote.health = data.hp;
                        updateRemoteHPBar();
                    }
                }
            });
        }

        function sendData(data) {
            if (conn && conn.open) conn.send(data);
        }

        // --- COMBAT LOGIC ---
        function takeDamage(dmg) {
            localPlayer.health -= dmg;
            if (localPlayer.health <= 0) {
                localPlayer.health = 0;
                respawn();
            }
            updateLocalHPUI();
            sendData({ type: 'healthUpdate', hp: localPlayer.health });
        }

        function respawn() {
            addChatMessage("System", "You were defeated! Respawning...");
            localPlayer.health = 100;
            localPlayer.mesh.position.set(0, 0, 0);
            localPlayer.velocity.set(0, 0, 0);
        }

        function updateLocalHPUI() {
            const fill = document.getElementById('hp-bar-fill');
            const text = document.getElementById('hp-text');
            const perc = (localPlayer.health / localPlayer.maxHealth) * 100;
            fill.style.width = perc + "%";
            text.innerText = `${localPlayer.health} / ${localPlayer.maxHealth}`;
        }

        function updateRemoteHPBar() {
            if (players.remote && players.remote.mesh.hpFill) {
                const perc = Math.max(0, players.remote.health / 100);
                players.remote.mesh.hpFill.scale.x = perc;
                players.remote.mesh.hpFill.position.x = (perc - 1) * 0.5;
            }
        }

        function spawnBullet(pos, dir, isRemote, color, damage = 0) {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.15), 
                new THREE.MeshBasicMaterial({ color: color })
            );
            bullet.position.copy(pos);
            bullets.push({ 
                mesh: bullet, 
                dir: new THREE.Vector3(dir.x, dir.y, dir.z), 
                life: 120, 
                isOwner: !isRemote,
                damage: damage 
            });
            scene.add(bullet);
        }

        function shoot() {
            const now = Date.now();
            const gun = GUNS[currentGunKey];
            if (now - lastFireTime < gun.rate) return;
            
            lastFireTime = now;
            // Spawn bullet exactly at camera center
            const spawnPos = camera.position.clone();

            for (let i = 0; i < gun.count; i++) {
                const baseDir = new THREE.Vector3(0, 0, -1);
                // Direction from camera perspective
                baseDir.applyQuaternion(camera.quaternion);
                
                baseDir.x += (Math.random() - 0.5) * gun.spread;
                baseDir.y += (Math.random() - 0.5) * gun.spread;
                baseDir.z += (Math.random() - 0.5) * gun.spread;
                baseDir.normalize().multiplyScalar(gun.speed);

                spawnBullet(spawnPos, baseDir, false, gun.color, gun.damage);
                sendData({ type: 'shoot', pos: spawnPos, dir: baseDir, color: gun.color });
            }
        }

        function addChatMessage(sender, text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><span class="font-bold text-blue-300">${sender}:</span> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // --- GAME LOOP ---
        function update() {
            const isTyping = document.activeElement === document.getElementById('chat-input') || 
                             document.activeElement === document.getElementById('username');

            if (!isTyping) {
                // Look Controls (Arrows)
                if (keys['ArrowLeft']) localPlayer.rotationY += 0.05;
                if (keys['ArrowRight']) localPlayer.rotationY -= 0.05;
                if (keys['ArrowUp']) localPlayer.rotationX = Math.max(-1.5, localPlayer.rotationX - 0.04);
                if (keys['ArrowDown']) localPlayer.rotationX = Math.min(1.5, localPlayer.rotationX + 0.04);

                localPlayer.mesh.rotation.y = localPlayer.rotationY;

                // Move Controls (WASD)
                const moveVec = new THREE.Vector3();
                if (keys['KeyW']) moveVec.z -= 0.15;
                if (keys['KeyS']) moveVec.z += 0.15;
                if (keys['KeyA']) moveVec.x -= 0.15;
                if (keys['KeyD']) moveVec.x += 0.15;
                moveVec.applyEuler(new THREE.Euler(0, localPlayer.rotationY, 0));
                localPlayer.mesh.position.add(moveVec);

                if (keys['Space'] && localPlayer.isGrounded) {
                    localPlayer.velocity.y = 0.25;
                    localPlayer.isGrounded = false;
                }

                if (keys['ShiftLeft'] || keys['KeyF']) shoot();

                if (moveVec.lengthSq() > 0 || !localPlayer.isGrounded || keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown']) {
                    sendData({ type: 'move', pos: localPlayer.mesh.position, rot: localPlayer.mesh.rotation.y });
                }
            }

            // Gravity
            localPlayer.mesh.position.y += localPlayer.velocity.y;
            if (localPlayer.mesh.position.y > 0) {
                localPlayer.velocity.y -= 0.01;
            } else {
                localPlayer.mesh.position.y = 0;
                localPlayer.velocity.y = 0;
                localPlayer.isGrounded = true;
            }

            // First Person Camera Positioning
            // Position camera at head level (roughly 1.6 units high)
            camera.position.set(
                localPlayer.mesh.position.x,
                localPlayer.mesh.position.y + 1.7, 
                localPlayer.mesh.position.z
            );
            
            // Set camera rotation based on look state
            camera.rotation.set(localPlayer.rotationX, localPlayer.rotationY, 0, 'YXZ');

            // Update Bullets & Collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.add(b.dir);
                b.life--;

                if (b.isOwner && players.remote) {
                    const enemyPos = players.remote.mesh.position.clone().add(new THREE.Vector3(0, 1, 0));
                    if (b.mesh.position.distanceTo(enemyPos) < 1.2) {
                        sendData({ type: 'hit', damage: b.damage });
                        b.life = 0;
                    }
                }

                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // Billboard effect for remote health bars
            if (players.remote) {
                players.remote.mesh.children.forEach(child => {
                    if (child.isMesh && child.geometry.type === 'PlaneGeometry') {
                        child.lookAt(camera.position);
                    }
                });
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        update();
    </script>
</body>
</html>
