<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Voice Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Voice Call</h1>
            <p class="text-slate-500 text-sm">Peer-to-peer audio connection</p>
        </header>

        <!-- Connection Status -->
        <div id="status-container" class="mb-6 p-4 rounded-lg bg-slate-100 flex items-center gap-3">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-yellow-400"></div>
            <span id="status-text" class="text-sm font-medium text-slate-700">Connecting to server...</span>
        </div>

        <!-- My ID Section -->
        <div class="mb-8">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Your 4-Digit ID</label>
            <div class="flex gap-2">
                <input type="text" id="my-id" readonly 
                    class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 font-mono text-2xl font-bold text-center focus:outline-none" 
                    placeholder="....">
                <button onclick="copyId()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg transition-colors text-sm font-medium">
                    Copy
                </button>
            </div>
        </div>

        <!-- Call Actions -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Call Someone</label>
                <div class="flex gap-2">
                    <input type="number" id="peer-id" 
                        class="flex-1 p-3 border border-slate-200 rounded-lg text-slate-700 text-xl font-bold text-center focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" 
                        placeholder="0000" maxlength="4">
                    <button id="call-btn" onclick="startCall()" 
                        class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-all shadow-md active:scale-95 disabled:opacity-50 disabled:pointer-events-none font-bold">
                        Call
                    </button>
                </div>
            </div>

            <!-- Active Call UI -->
            <div id="active-call" class="hidden pt-6 border-t border-slate-100">
                <div class="flex flex-col items-center text-center">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-4 status-pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                    <p class="text-slate-800 font-semibold mb-1">In Call</p>
                    <button onclick="endCall()" class="mt-4 px-8 py-2 bg-red-500 hover:bg-red-600 text-white rounded-full transition-colors shadow-lg active:scale-95">
                        End Call
                    </button>
                </div>
            </div>
        </div>

        <!-- Hidden Audio Element -->
        <audio id="remote-audio" autoplay class="hidden"></audio>
    </div>

    <!-- Notification Overlay -->
    <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white rounded-full text-sm opacity-0 transition-opacity pointer-events-none shadow-2xl">
        ID Copied!
    </div>

    <script>
        let peer;
        let currentCall;
        let localStream;

        const myIdInput = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id');
        const callBtn = document.getElementById('call-btn');
        const activeCallDiv = document.getElementById('active-call');
        const remoteAudio = document.getElementById('remote-audio');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Function to generate a simple 4-digit ID
        function generateShortId() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // Initialize PeerJS
        function init() {
            const shortId = generateShortId();
            // We pass the shortId to the constructor
            peer = new Peer(shortId);

            peer.on('open', (id) => {
                myIdInput.value = id;
                updateStatus('online', 'Ready for calls');
            });

            peer.on('call', (call) => {
                const confirmCall = confirm("Incoming voice call! Accept?");
                if (confirmCall) {
                    answerCall(call);
                } else {
                    call.close();
                }
            });

            peer.on('error', (err) => {
                // If ID is taken, try another one
                if (err.type === 'unavailable-id') {
                    init(); 
                } else {
                    console.error(err);
                    updateStatus('error', 'Connection error');
                }
            });

            peer.on('disconnected', () => {
                updateStatus('offline', 'Disconnected');
            });
        }

        async function getMedia() {
            try {
                return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert('Microphone access is required for voice calls.');
                throw err;
            }
        }

        async function startCall() {
            const destId = peerIdInput.value.trim();
            if (!destId) return;

            try {
                updateStatus('busy', 'Calling...');
                localStream = await getMedia();
                const call = peer.call(destId, localStream);
                setupCallHandlers(call);
            } catch (err) {
                updateStatus('online', 'Ready');
            }
        }

        async function answerCall(call) {
            try {
                localStream = await getMedia();
                call.answer(localStream);
                setupCallHandlers(call);
            } catch (err) {
                console.error("Failed to answer", err);
            }
        }

        function setupCallHandlers(call) {
            currentCall = call;

            call.on('stream', (remoteStream) => {
                remoteAudio.srcObject = remoteStream;
                showActiveUI(true);
                updateStatus('busy', 'Active Call');
            });

            call.on('close', () => {
                cleanupCall();
            });

            call.on('error', () => {
                cleanupCall();
            });
        }

        function endCall() {
            if (currentCall) currentCall.close();
            cleanupCall();
        }

        function cleanupCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            showActiveUI(false);
            updateStatus('online', 'Ready for calls');
        }

        function updateStatus(state, message) {
            statusText.innerText = message;
            statusDot.className = 'w-3 h-3 rounded-full ';
            
            if (state === 'online') statusDot.classList.add('bg-green-500');
            else if (state === 'busy') statusDot.classList.add('bg-blue-500', 'status-pulse');
            else if (state === 'error') statusDot.classList.add('bg-red-500');
            else statusDot.classList.add('bg-yellow-400');
        }

        function showActiveUI(isActive) {
            activeCallDiv.classList.toggle('hidden', !isActive);
            callBtn.disabled = isActive;
            peerIdInput.disabled = isActive;
        }

        function copyId() {
            myIdInput.select();
            document.execCommand('copy');
            
            const note = document.getElementById('notification');
            note.style.opacity = '1';
            setTimeout(() => note.style.opacity = '0', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
