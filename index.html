<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom ID Peer Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        #chat-box { height: 250px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; background: #f9f9f9; position: relative; }
        #typing-status { font-size: 0.8em; color: #888; height: 20px; margin-bottom: 10px; }
        .user-msg { margin: 5px 0; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        input { padding: 8px; margin: 5px 0; }
        button { padding: 8px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .btn-clear { background: #dc3545; }
    </style>
</head>
<body>

    <h2>PeerJS Chat</h2>
    <p id="my-id-display">Connecting...</p>
    
    <div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
    </div>

    <div id="chat-box"></div>
    <div id="typing-status"></div>
    
    <input type="text" id="message-input" placeholder="Type a message..." oninput="sendTyping()">
    <button onclick="sendMsg()">Send</button>
    <button class="btn-clear" onclick="clearChat()">Clear</button>

    <script>
        // 1. GENERATE CUSTOM 5-DIGIT ID
        // Math.random() * 90000 + 10000 ensures a number between 10000 and 99999
        const customId = Math.floor(10000 + Math.random() * 90000).toString();
        
        // Pass the customId to the Peer constructor
        const peer = new Peer(customId); 
        let connection;

        const chatBox = document.getElementById('chat-box');
        const typingStatus = document.getElementById('typing-status');

        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerHTML = `Your ID: <strong>${id}</strong>`;
        });

        // Receiving connection
        peer.on('connection', (conn) => {
            connection = conn;
            setupListeners();
        });

        function connectToFriend() {
            const friendId = document.getElementById('remote-id').value;
            connection = peer.connect(friendId);
            setupListeners();
        }

        function setupListeners() {
            connection.on('data', (data) => {
                // 2. CHECK IF DATA IS A SPECIAL COMMAND
                if (data === "TYPING_ON") {
                    typingStatus.innerText = "Friend is typing...";
                } else if (data === "TYPING_OFF") {
                    typingStatus.innerText = "";
                } else {
                    typingStatus.innerText = ""; // Clear typing when message arrives
                    addLog("Friend: " + data);
                }
            });
        }

        // 3. TYPING INDICATOR LOGIC
        let typingTimer;
        function sendTyping() {
            if (connection && connection.open) {
                connection.send("TYPING_ON");
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    connection.send("TYPING_OFF");
                }, 2000); // Stop showing "typing" after 2 seconds of silence
            }
        }

        function sendMsg() {
            const input = document.getElementById('message-input');
            if (connection && connection.open && input.value !== "") {
                connection.send(input.value);
                addLog("You: " + input.value);
                input.value = "";
                connection.send("TYPING_OFF"); 
            }
        }

        // 4. CLEAR CHAT LOGIC
        function clearChat() {
            chatBox.innerHTML = "";
        }

        function addLog(text) {
            chatBox.innerHTML += `<div class="user-msg">${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
