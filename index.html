<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P LAN Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        height: 90vh;
        padding: 20px;
      }
      #chat {
        flex-grow: 1;
        border: 1px solid #ccc;
        overflow-y: scroll;
        margin-bottom: 10px;
        padding: 10px;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }
      input {
        padding: 8px;
      }
      #message {
        flex-grow: 1;
      }
    </style>
  </head>
  <body>
    <h2>P2P Static Chat</h2>

    <div class="controls">
      <strong>Your ID:</strong> <span id="my-id">...</span>
    </div>

    <div class="controls">
      <input type="text" id="dest-id" placeholder="Paste Friend's ID here" />
      <button onclick="connectToPeer()">Connect</button>
    </div>

    <div id="chat"></div>

    <div class="controls">
      <input type="text" id="message" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <script>
      const chatBox = document.getElementById('chat');
      const messageInput = document.getElementById('message');
      const destInput = document.getElementById('dest-id');
      let peer = new Peer(); // Generates a random ID
      let conn;

      // 1. Display your ID so you can share it
      peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
      });

      // 2. Listen for incoming connections
      peer.on('connection', (connection) => {
        conn = connection;
        setupChat();
      });

      // 3. Connect to a friend
      function connectToPeer() {
        const peerId = destInput.value;
        conn = peer.connect(peerId);
        setupChat();
      }

      // 4. Handle sending/receiving
      function setupChat() {
        conn.on('open', () => {
          appendMessage('<i>System: Connected!</i>');

          conn.on('data', (data) => {
            appendMessage('<b>Peer:</b> ' + data);
          });
        });
      }

      function sendMessage() {
        const msg = messageInput.value;
        if (conn && conn.open) {
          conn.send(msg);
          appendMessage('<b>You:</b> ' + msg);
          messageInput.value = '';
        } else {
          alert('Not connected to anyone!');
        }
      }

      function appendMessage(html) {
        chatBox.innerHTML += '<div>' + html + '</div>';
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    </script>
  </body>
</html>
